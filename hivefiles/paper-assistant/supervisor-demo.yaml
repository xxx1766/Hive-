# paper-supervisor demo — peer_call_many fan-out + Member-name aliasing.
#
# The supervisor (manager) auto-hires TWO instances of paper-reviewer:0.1.0
# at runtime under distinct aliases (reviewer-anti-pattern, reviewer-style),
# calls both in parallel via peer_call_many, and aggregates the two
# (focus-nudged) reports into one.
#
# Prereqs (one-time):
#   ./bin/hive build ./examples/paper-assistant/supervisor
#   ./bin/hive build ./examples/paper-assistant/reviewer       # both aliases run this image
#   ./bin/hive volume create paper-osdi-corpus
#   ./bin/hive volume create paper-osdi-draft
#   cp examples/paper-assistant-osdi/sample-corpus/*.md $HIVE_STATE/volumes/paper-osdi-corpus/
#
# Need design.md to exist before review:
#   # easiest: run the coordinator demo first to draft it
#   ./bin/hive hire -f hivefiles/paper-assistant/coordinator-demo.yaml
#   ... drive a conversation through paper-coordinator, wait for design.md ...
#
# Then run THIS demo:
#   ROOM=$(./bin/hive hire -f hivefiles/paper-assistant/supervisor-demo.yaml)
#   # UI: target=paper-supervisor, input={"section":"design"}
room: paper-supervisor-demo
entry: paper-supervisor
agents:
  - image: paper-supervisor:0.1.0
    rank: manager
    model: openai/gpt-5.4-mini
    quota:
      # Supervisor's own LLM use ≈ 5k tokens. Two carves of 8k each =
      # 16k. 30k total leaves headroom for retries / longer prompts.
      tokens:
        "openai/gpt-5.4-mini": 30000
    volumes:
      - {name: paper-osdi-corpus, mode: ro, mountpoint: /shared/corpus}
      - {name: paper-osdi-draft,  mode: ro, mountpoint: /shared/draft}
